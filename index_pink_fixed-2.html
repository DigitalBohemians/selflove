    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --gold-dim: #c04f72;
      --cream: #2a0818;
      --deep: #f5dce5;
    }
    html, body {
      height: 100%; background: var(--deep); color: var(--cream);
      font-family: 'Inter', sans-serif;
      overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .view { position: fixed; inset: 0; transition: opacity 0.8s ease; }
    .view.hidden { opacity: 0; pointer-events: none; visibility: hidden; }

    #view-affirmation { z-index: 10; }

    .bg { position: absolute; inset: 0; }
    .bg-gradient {

        rgba(229,107,138,.15) 0%, rgba(245,180,200,.3) 60%, var(--deep) 100%);
    }
    .center-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 22% 22% at 50% 48%,
        rgba(255,255,255,0.92) 0%,
        rgba(255,255,255,0.50) 30%,
        rgba(255,255,255,0.15) 60%,
        transparent 75%);
    }
    .warm-glow {
      position: absolute; inset: 0; pointer-events: none;

        rgba(229, 107, 138, 0.55) 0%,
        rgba(229, 107, 138, 0.28) 40%,

    .bg-noise {

    .orb-wrap { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .orb {
      width: min(70vw,70vh); height: min(70vw,70vh); border-radius: 50%;

        rgba(100,15,45,.45) 25%,
        rgba(130,20,55,.30) 50%,

      animation: orbPulse 6s ease-in-out infinite;
    }
    @keyframes orbPulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }

    .rays-svg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .rays-svg svg { width:min(100vw,100vh); height:min(100vw,100vh); opacity:.55; animation:raysSpin 60s linear infinite; }
    @keyframes raysSpin { to{transform:rotate(360deg)} }

    #aff-canvas { position:absolute; inset:0; }

    .corner { position:absolute; width:40px; height:40px; opacity:.25; }
    .corner svg { width:100%; height:100%; }

    .corner.tr{top:1.5rem;right:1.5rem;transform:scaleX(-1)}
    .corner.bl{bottom:3rem;left:1.5rem;transform:scaleY(-1)}
    .corner.br{bottom:3rem;right:1.5rem;transform:scale(-1)}

    .stage {

      align-items: center; justify-content: center;
      text-align: center; padding: 0 2rem;
      padding-bottom: calc(5vh - 8px);
    }
    .eyebrow {
      font-family:'Inter',sans-serif; font-size:clamp(.55rem,1.8vw,.75rem);
      font-weight:300; letter-spacing:.35em; color:rgba(42,8,24,.7);
      text-transform:uppercase; margin-bottom:.4rem; margin-top:0;
      opacity:0; animation:fadeUp 1.8s ease .3s forwards;
    }
    .divider {
      width:1px; height:48px;
      background:linear-gradient(to bottom,transparent,rgba(229,107,138,.8),transparent);
      margin:0 auto 2.5rem; opacity:0; animation:fadeUp 1.8s ease .5s forwards;
    }
    .affirmation-box {
      max-width:min(680px,90vw); min-height:8rem;
      display:flex; align-items:center; justify-content:center;
      position: relative;
    }
    .affirmation-box::before {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 110%; height: 36px;
      background: radial-gradient(ellipse 100% 100% at 50% 50%,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.10) 50%,
        transparent 80%);
      pointer-events: none;
      z-index: 0;
    }
    .affirmation-box p { position: relative; z-index: 1; }
    .headlines {
      position: absolute; top: 2.5rem; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      z-index: 11;
    }
    .eyebrow-sub {
      font-family:'Inter',sans-serif; font-style:italic; font-size:clamp(.8rem,2.5vw,1rem);
      font-weight:300; color:rgba(229,107,138,0.7); letter-spacing:.15em;
      margin-top:-.5rem; margin-bottom:0;
      opacity:0; animation:fadeUp 1.8s ease .5s forwards;
    }
    #affirmation {
      font-weight:300; font-style:italic; font-size:clamp(1.4rem,4.5vw,2.4rem);
      line-height:1.65; color:#2a0818; letter-spacing:.01em; word-break:keep-all; overflow-wrap:break-word; hyphens:none;
      text-shadow: 0 0 40px rgba(229,107,138,0.7), 0 0 80px rgba(255,120,170,0.4), 0 0 120px rgba(220,80,140,0.2);
      transition:opacity 1.2s ease, transform 1.2s ease;
    }
    #affirmation.fade-out  { opacity:0; transform:translateY(-12px); }
    #affirmation.fade-in   { opacity:1; transform:translateY(0); }
    #affirmation.hidden    { opacity:0; transform:translateY(12px); }
    .divider2 { width:1px; height:80px; background:linear-gradient(to bottom,transparent,rgba(229,107,138,.8),transparent); margin:0; opacity:0; animation:fadeUp 1.8s ease .7s forwards; }
    .bottom-btns {
      position: absolute;
      bottom: 3.5rem; left: 0; right: 0; top: auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      opacity:0; animation:fadeUp 1.8s ease 1s forwards;

    .ar-btn-fixed {

      letter-spacing:.2em; text-transform:uppercase; padding:.7rem 1.6rem;

    .sound-fab {

    #sound-label {
      font-family: 'Inter', sans-serif; font-size: .55rem; letter-spacing: .28em;
      text-transform: uppercase;

    .ar-close-btn:hover { background:rgba(230,140,175,.15); }
    .ar-bottom { display:flex; flex-direction:column; align-items:center; gap:1.2rem; }

    .perm-text { font-size:1rem; color:rgba(255,255,255,0.6); line-height:1.6; max-width:280px; }
    .perm-btn {

    .perm-back {
      background:none; border:none; color:rgba(255,255,255,.45);

    .perm-err { color:rgba(255,120,80,.8); font-size:.85rem; display:none; }

</head>

function getDailyIndex(total) {
  const now = new Date();
  // Use local date so midnight resets per user timezone
  const dateKey = now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate();
  // Simple deterministic hash of date → index
  return dateKey % total;
}
function getRandom() {
  const aff = affirmations;
  return aff[getDailyIndex(aff.length)];
}
function nextAffirmation() {
  const el = document.getElementById('affirmation');

    el.textContent = text; el.classList.remove('hidden');
    requestAnimationFrame(() => el.classList.add('fade-in'));
  } else {
    el.classList.add('fade-out');
    setTimeout(() => {
      el.textContent = text; el.classList.remove('fade-out','fade-in');
      void el.offsetWidth; el.classList.add('fade-in');
    }, 1200);
  }
}

/* Affirmation bg particles — bidirectional */
(function(){
  const canvas = document.getElementById('aff-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  function mkP(dirOverride){
    const cx=W/2, cy=H*.48, sp=Math.min(W,H)*.28;
    // dir: 1 = up, -1 = down
    const dir = dirOverride !== undefined ? dirOverride : (Math.random() < 0.5 ? 1 : -1);
    return {
      x: cx+(Math.random()-.5)*sp*2,
      y: cy+(Math.random()-.5)*sp,
      r: Math.random()*1.8+.3,
      speed: Math.random()*.45+.08,
      dir: dir,
      alpha: 0,
      maxAlpha: Math.random()*.7+.15,
      life: 0,
      maxLife: Math.random()*320+140,
      dx: (Math.random()-.5)*.25
    };
  }

  // Seed half up, half down
  for(let i=0;i<80;i++){
    const p=mkP(i < 40 ? 1 : -1);
    p.life=Math.random()*p.maxLife;
    pts.push(p);
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    pts.forEach((p,i)=>{
      p.life++;
      p.x += p.dx;
      p.y -= p.speed * p.dir;  // dir: +1 up, -1 down
      const t=p.life/p.maxLife;
      p.alpha=t<.15?(t/.15)*p.maxAlpha:t>.75?((1-t)/.25)*p.maxAlpha:p.maxAlpha;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.alpha})`; ctx.fill();
      // Out of bounds or life ended — respawn same direction
      if(p.life>=p.maxLife || p.y < -20 || p.y > H+20) pts[i]=mkP(p.dir);
    });
    requestAnimationFrame(loop);
  }
  loop();
})();


/* ══ AUDIO ENGINE ══ */
let soundEnabled = true;
let audioUnlocked = false;
const audio = new Audio('DigitalWave.mp3');
audio.loop = true;
audio.volume = 0.7;

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-toggle');
  document.getElementById('sound-icon-on').style.display  = soundEnabled ? 'block' : 'none';
  document.getElementById('sound-icon-off').style.display = soundEnabled ? 'none'  : 'block';
  document.getElementById('sound-label').textContent = soundEnabled ? 'sound on' : 'sound off';
  btn.classList.toggle('active', soundEnabled);
  if (!soundEnabled) {
    audio.pause();
  } else {
    audio.play().catch(e => console.warn('Audio play error:', e));
  }
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    if (soundEnabled && audio) {
      const p = audio.play();
      if (p && p.then) {
        p.then(() => {
          const lbl = document.getElementById('sound-label');
          const btn = document.getElementById('sound-toggle');
          if (lbl) lbl.textContent = 'sound on';
          if (btn) btn.classList.add('active');
        }).catch(() => {});
      }
    }
  } catch(e) {}
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', function onFirstClick() {
  unlockAudio();
  document.removeEventListener('click', onFirstClick);
});

async function startCamera() {
  document.getElementById('perm-err').style.display = 'none';
  const attempts = [
    { video: { facingMode: { ideal: 'environment' }, width:{ideal:1920}, height:{ideal:1080} }, audio: false },
    { video: { facingMode: 'user' }, audio: false },
    { video: true, audio: false },
  ];
  for (const c of attempts) {
    try {
      arStream = await navigator.mediaDevices.getUserMedia(c);
      const video = document.getElementById('ar-video');
      video.srcObject = arStream;
      await video.play();
      document.getElementById('ar-permission').classList.add('gone');
      initARCanvas();
      return;
    } catch(e) { /* try next */ }
  }
  // All attempts failed — show permission screen with error
  document.getElementById('ar-permission').classList.remove('gone');
  const err = document.getElementById('perm-err');
  err.textContent = 'Camera access was denied. Please allow it in your browser settings.';
  err.style.display = 'block';
}

function initARCanvas() {
  const canvas = document.getElementById('ar-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize); resize();

  const G  = (a) => `rgba(229,107,138,${a})`;
  const WH = (a) => `rgba(255,180,210,${a})`;

  /* ── Floating particles ── */
  const particles = [];
  function mkParticle() {
    const spread = Math.random();
    const x = spread < .7
      ? W*.5 + (Math.random()-.5)*W*.55
      : Math.random()*W;
    const y = spread < .7
      ? H*.55 + (Math.random()-.5)*H*.45
      : Math.random()*H;
    return {
      x, y,
      r: Math.random()*2.2+.4,
      vy: -(Math.random()*.5+.08),
      vx: (Math.random()-.5)*.2,
      life: 0,
      maxLife: Math.random()*440+180,
      maxAlpha: Math.random()*.75+.12,
      alpha: 0,
      star: Math.random() < .22,
      twinkle: Math.random()*Math.PI*2,
    };
  }
  for (let i=0;i<100;i++){const p=mkParticle();p.life=Math.random()*p.maxLife;particles.push(p);}

  /* ── Pulsing rings ── */
  const rings = [];
  function mkRing() {
    return {
      x: W*.3 + Math.random()*W*.4,
      y: H*.25 + Math.random()*H*.45,
      r: 0,
      targetR: Math.random()*Math.min(W,H)*.2 + 28,
      speed: Math.random()*.35+.12,
      alpha: 0,
      phase: 'grow',
      holdT: 0,
      maxHold: Math.random()*90+40,
      thick: Math.random()*1.1+.3,
    };
  }
  for(let i=0;i<7;i++){const r=mkRing();r.r=r.targetR*Math.random()*.9;rings.push(r);}

  /* ── Light streaks ── */
  const streaks = [];
  function mkStreak() {
    const angle = Math.random()*Math.PI*2;
    return {
      cx: W*.28+Math.random()*W*.44,
      cy: H*.22+Math.random()*H*.54,
      angle,
      len: Math.random()*130+35,
      life: 0,
      maxLife: Math.random()*200+70,
      maxAlpha: Math.random()*.5+.08,
      alpha: 0,
      width: Math.random()*1.4+.25,
      drift: (Math.random()-.5)*.003,
    };
  }
  for(let i=0;i<14;i++){const s=mkStreak();s.life=Math.random()*s.maxLife;streaks.push(s);}

  function drawStar(x, y, r, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = G(1);
    ctx.lineWidth = .5;
    ctx.shadowBlur = 8;
    ctx.shadowColor = G(.6);
    ctx.translate(x, y);
    for(let i=0;i<4;i++){
      ctx.beginPath(); ctx.moveTo(0,-r*1.7); ctx.lineTo(0,r*1.7); ctx.stroke();
      ctx.rotate(Math.PI/4);
    }
    ctx.restore();
  }

  function loop() {
    if (canvas.offsetWidth !== W || canvas.offsetHeight !== H) resize();
    ctx.clearRect(0, 0, W, H);

    /* Rings */
    rings.forEach((rr, i) => {
      if (rr.phase === 'grow') {
        rr.r += rr.speed;
        rr.alpha = Math.min(rr.alpha + .010, .52);
        if (rr.r >= rr.targetR) rr.phase = 'hold';
      } else if (rr.phase === 'hold') {
        rr.holdT++;
        if (rr.holdT >= rr.maxHold) rr.phase = 'fade';
      } else {
        rr.alpha -= .005;
        rr.r += rr.speed * .35;
        if (rr.alpha <= 0) rings[i] = mkRing();
      }
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = G(.35);
      ctx.beginPath();
      ctx.arc(rr.x, rr.y, rr.r, 0, Math.PI*2);
      ctx.strokeStyle = G(rr.alpha);
      ctx.lineWidth = rr.thick * 1.8;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(rr.x, rr.y, rr.r*1.05, 0, Math.PI*2);
      ctx.strokeStyle = WH(rr.alpha * .28);
      ctx.lineWidth = rr.thick * .5;
      ctx.stroke();
      ctx.restore();
    });

    /* Streaks */
    streaks.forEach((s, i) => {
      s.life++; s.angle += s.drift;
      const tt = s.life / s.maxLife;
      s.alpha = tt < .15 ? (tt/.15)*s.maxAlpha
              : tt > .7  ? ((1-tt)/.3)*s.maxAlpha
              : s.maxAlpha;
      const cos=Math.cos(s.angle), sin=Math.sin(s.angle);
      const x1=s.cx-cos*(s.len/2), y1=s.cy-sin*(s.len/2);
      const x2=s.cx+cos*(s.len/2), y2=s.cy+sin*(s.len/2);
      const grad = ctx.createLinearGradient(x1,y1,x2,y2);
      grad.addColorStop(0,   G(0));
      grad.addColorStop(.2,  G(s.alpha));
      grad.addColorStop(.5,  WH(s.alpha*.75));
      grad.addColorStop(.8,  G(s.alpha));
      grad.addColorStop(1,   G(0));
      ctx.save();
      ctx.shadowBlur = 14;
      ctx.shadowColor = G(.4);
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width*2.2;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
      if (s.life >= s.maxLife) streaks[i] = mkStreak();
    });

    /* Particles */
    particles.forEach((p, i) => {
      p.life++; p.x+=p.vx; p.y+=p.vy;
      p.twinkle += .035;
      const tr = p.life/p.maxLife;
      p.alpha = tr<.12?(tr/.12)*p.maxAlpha : tr>.78?((1-tr)/.22)*p.maxAlpha : p.maxAlpha;
      const ta = p.alpha * (.7 + .3*Math.sin(p.twinkle));
      if (p.star && p.r > 1.2) {
        drawStar(p.x, p.y, p.r*.7, ta*.85);
      } else {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = G(.5);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = G(ta);
        ctx.fill();
        if (p.r > 1.3) {
          ctx.beginPath();
          ctx.arc(p.x-.3, p.y-.3, p.r*.3, 0, Math.PI*2);
          ctx.fillStyle = WH(ta*.55);
          ctx.fill();
        }
        ctx.restore();
      }
      if (p.life >= p.maxLife || p.y < -20) particles[i] = mkParticle();
    });

    arAnimId = requestAnimationFrame(loop);
  }
  loop();
}
